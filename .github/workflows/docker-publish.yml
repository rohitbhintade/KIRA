name: CI/CD Pipeline - Build, Scan, & Publish

on:
  push:
    branches: [ "master", "develop" ]
    tags: [ 'v*.*.*' ] # Triggered when a new release tag is pushed (e.g., v1.0.0)
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Python Linting
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit
          pip install -r requirements-test.txt
          pip install -r services/feature_engine/requirements.txt || true # Load actual logic deps

      - name: Run Unit Tests (PyTest) & Generate Coverage
        run: |
          pytest tests/unit/ --junitxml=pytest.xml --cov-report=xml --cov=services

      - name: Security Scan (Bandit)
        run: |
          bandit -r services/ -ll -i || echo "Bandit found potential issues, please review."

      - name: Syntax Check (Flake8)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 services/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Start Ephemeral Kafka for Integration Tests
        run: |
          docker run -d --name test_kafka -p 9094:9094 -e KAFKA_NODE_ID=1 -e KAFKA_PROCESS_ROLES=broker,controller -e KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093 -e KAFKA_ADVERTISED_LISTENERS=INTERNAL://test_kafka:9092,EXTERNAL://localhost:9094 -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER -e KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL -e KAFKA_CONTROLLER_QUORUM_VOTERS=1@test_kafka:9093 -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 apache/kafka:latest
          sleep 10 # Wait for Kafka to boot

      - name: Run Integration Tests
        run: |
          pytest tests/integration/

      - name: Tear Down Empheral Infra
        run: docker rm -f test_kafka

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false # Won't fail if token isn't setup inside Github Secrets yet
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Frontend Linting Check
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Frontend Quality Check
        working-directory: frontend
        run: |
          npm ci
          npm run lint --if-present

  build-scan-publish:
    name: Build, Scan & Publish Images
    needs: code-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # For Trivy vulnerability scanner

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'frontend'
            path: 'frontend'
          - name: 'api-gateway'
            path: 'services/api_gateway'
          - name: 'strategy-runtime'
            path: 'services/strategy_runtime'
          - name: 'edge-detector'
            path: 'services/edge_detector'
          - name: 'scanner'
            path: 'services/scanner'
          - name: 'feature-engine'
            path: 'services/feature_engine'
          - name: 'backfiller'
            path: 'services/backfiller'
          - name: 'ingestor'
            path: 'services/ingestion'
          - name: 'persistor'
            path: 'services/persistor'
          - name: 'system-doctor'
            path: 'services/system_doctor'
          - name: 'optimizer'
            path: 'services/optimizer'
          - name: 'historical-replayer'
            path: 'services/historical_replayer'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        id: repo_name
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # This auto-generates tagging rules: beta on master, stable on v1.0 tags, etc.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo_name.outputs.repository }}/${{ matrix.name }}
          tags: |
            type=schedule,pattern=nightly
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            # If pushes to master, tag as beta
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/master' }}
            # If tagging a release, also tag as stable
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Always push latest on master or tags
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build Docker image (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.path }}
          load: true # Load to local Docker daemon to scan it before pushing
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run Trivy vulnerability scanner on the built image before pushing
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.repo_name.outputs.repository }}/${{ matrix.name }}:sha-${{ github.sha }}
          format: 'table'
          exit-code: '0' # Set to 1 to fail the pipeline on CRITICAL vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
