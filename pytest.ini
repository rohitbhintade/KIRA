[pytest]
testpaths = tests
python_files = test_*.py
addopts = -v --cov=services --cov-report=xml --cov-fail-under=20
# We set fail-under to a low threshold (20%) just to demonstrate the CI pipeline failure enforcement.
# In a real enterprise system, this slowly grows to 85%+.

markers =
    integration: mark test as requiring external infrastructure (Kafka, DB)
